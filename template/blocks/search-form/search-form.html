<!-- start search-form -->
<form action="#" block="search-form">
    <button>{{ _icon('search', { tag: 'span' }) }} </button>
    {% if placeholder %}
    <input type="search" placeholder="{{placeholder}}">
    {% else %}
    <input type="search" value="Гейм-провайдеры">
    {% endif %}
</form>
<!-- end search-form -->
