<!-- start author-badge -->
<span block="author-badge">
    <span elem="avatar">
        <img loading="lazy" src="{{badgeAvatar}}" alt="">
    </span>
    <span elem="col">
        <span elem="name">{{badgeName}}</span>
        {% if badgeRole %}
        <span elem="role">{{badgeRole}}</span>
        {% endif %}
    </span>
</span>
<!-- end author-badge -->
